<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulador descenso</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family: 'Inter', sans-serif;
    background: url('fondo.jpg') no-repeat center center fixed;
    background-size: cover;
    color:white;
}

body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(2,6,23,0.75);
    z-index:-1;
}

/* HEADER */
h1{
    text-align:center;
    padding:20px;
    margin:0;
    font-size:26px;
    font-weight:700;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
}

h1 img{
    height:34px;
}

/* LAYOUT */
.container{
    display:flex;
    justify-content:center;
    gap:25px;
    padding:20px;
}

/* TARJETAS */
.card{
    background: rgba(15, 23, 42, 0.85);
    border-radius:16px;
    padding:18px;
    backdrop-filter: blur(8px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.7);
    border:1px solid rgba(255,255,255,0.05);
}

/* IZQ */
.izq{ width:400px; }

/* DER */
.der{ width:330px; }

/* NAV */
.nav{
    text-align:center;
    margin-bottom:12px;
}

.nav span{
    padding:6px 12px;
    margin:3px;
    cursor:pointer;
    border-radius:8px;
    background:#1e293b;
    font-weight:600;
    transition:0.2s;
}

.activa{
    background:#ef4444;
    box-shadow:0 0 10px rgba(239,68,68,0.7);
}

/* TITULOS */
.titulo{
    font-size:18px;
    text-align:center;
    font-weight:700;
    letter-spacing:1px;
    margin-bottom:12px;
}

/* PARTIDOS */
.partido{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:10px 0;
    font-size:15px;
    font-weight:600;
}

.equipo{
    width:140px;
    display:flex;
    align-items:center;
    gap:12px;
}

/* ESCUDOS JORNADAS (igual) */
.equipo img{
    width:34px;
    height:34px;
}

/* MARCADOR */
.marcador{
    display:flex;
    gap:8px;
    align-items:center;
}

input{
    width:40px;
    height:36px;
    text-align:center;
    border-radius:10px;
    border:none;
    background:#020617;
    color:white;
    font-weight:700;
}

/* TABLA */
.fila{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    font-size:15px;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.fila span{
    display:flex;
    align-items:center;
    gap:12px;
}

/* 🔥 ESCUDOS MÁS GRANDES EN CLASIFICACIÓN */
.fila img{
    width:34px;
    height:34px;
}

.cabecera{
    font-weight:700;
    border-bottom:1px solid #334155;
    padding-bottom:8px;
    margin-bottom:8px;
}

.descenso{
    color:#ff4d4d;
    font-weight:700;
}

/* NOTAS FUERA */
.notas{
    max-width:900px;
    margin:10px auto 30px auto;
    text-align:center;
    font-size:13px;
    color:#cbd5f5;
    opacity:0.85;
    line-height:1.6;
}
</style>
</head>

<body>

<h1>
SIMULADOR DESCENSO
<img src="laliga.png">
</h1>

<div class="container">

<div class="card izq">
<div class="nav" id="nav"></div>
<div class="titulo" id="tituloJornada"></div>
<div id="partidos"></div>
</div>

<div class="card der">
<div class="titulo">🏆 CLASIFICACIÓN</div>

<div class="fila cabecera">
<span>Equipo</span>
<span>Pts</span>
</div>

<div id="tabla"></div>
</div>

</div>

<!-- 🔥 NOTAS FUERA -->
<div class="notas">
* Introduce los resultados y se actualizará la clasificación automáticamente<br>
* Clasificación calculada teniendo en cuenta los enfrentamientos directos entre equipos en caso de empate a puntos.
</div>

<script>

const base = {
"OVIEDO":28,"LEVANTE":33,"SEVILLA":34,"MALLORCA":35,
"ALAVÉS":36,"GIRONA":38,"ESPANYOL":38,"ELCHE":38,
"VALENCIA":39,"RAYO":39
};

const jornadas = {
34:[["BETIS","OVIEDO"],["VILLARREAL","LEVANTE"],["SEVILLA","R.SOCIEDAD"],["GIRONA","MALLORCA"],["ALAVÉS","ATHLETIC"],["ESPANYOL","R.MADRID"],["CELTA","ELCHE"],["VALENCIA","ATLÉTICO"],["GETAFE","RAYO"]],
35:[["OVIEDO","GETAFE"],["LEVANTE","OSASUNA"],["SEVILLA","ESPANYOL"],["MALLORCA","VILLARREAL"],["ELCHE","ALAVÉS"],["RAYO","GIRONA"],["ATHLETIC","VALENCIA"]],
36:[["R.MADRID","OVIEDO"],["CELTA","LEVANTE"],["VILLARREAL","SEVILLA"],["GETAFE","MALLORCA"],["ALAVÉS","BARCELONA"],["GIRONA","R.SOCIEDAD"],["ESPANYOL","ATHLETIC"],["BETIS","ELCHE"],["VALENCIA","RAYO"]],
37:[["OVIEDO","ALAVÉS"],["LEVANTE","MALLORCA"],["SEVILLA","R.MADRID"],["ATLÉTICO","GIRONA"],["OSASUNA","ESPANYOL"],["ELCHE","GETAFE"],["R.SOCIEDAD","VALENCIA"],["RAYO","VILLARREAL"]],
38:[["MALLORCA","OVIEDO"],["BETIS","LEVANTE"],["CELTA","SEVILLA"],["ALAVÉS","RAYO"],["GIRONA","ELCHE"],["ESPANYOL","R.SOCIEDAD"],["VALENCIA","BARCELONA"]]
};

let jornadaActual = 34;
let resultados = {};

function escudo(nombre){
    return `<img src="escudos/${nombre.toLowerCase()}.png">`;
}

function renderNav(){
    let html="";
    Object.keys(jornadas).forEach(j=>{
        html+=`<span onclick="cambiar(${j})" class="${j==jornadaActual?'activa':''}">${j}</span>`;
    });
    document.getElementById("nav").innerHTML=html;
}

function renderPartidos(){
    let lista = jornadas[jornadaActual];
    document.getElementById("tituloJornada").innerText="📅 Jornada "+jornadaActual;

    let html="";
    lista.forEach((p,i)=>{
        let key=jornadaActual+"-"+i;
        let gl=resultados[key]?.gl??"";
        let gv=resultados[key]?.gv??"";

        html+=`
        <div class="partido">
            <span class="equipo">${escudo(p[0])}${p[0]}</span>

            <div class="marcador">
                <input value="${gl}" oninput="guardar(${jornadaActual},${i},this.value,null)">
                -
                <input value="${gv}" oninput="guardar(${jornadaActual},${i},null,this.value)">
            </div>

            <span class="equipo" style="justify-content:flex-end">${p[1]}${escudo(p[1])}</span>
        </div>`;
    });

    document.getElementById("partidos").innerHTML=html;
}

function guardar(j,i,gl,gv){
    let key=j+"-"+i;
    if(!resultados[key]) resultados[key]={};

    if(gl!==null) resultados[key].gl=parseInt(gl);
    if(gv!==null) resultados[key].gv=parseInt(gv);

    calcular();
}

function cambiar(j){
    jornadaActual=j;
    renderNav();
    renderPartidos();
}

function calcular(){

    let puntos={...base};

    Object.entries(resultados).forEach(([k,r])=>{
        if(isNaN(r.gl)||isNaN(r.gv)) return;

        let [j,i]=k.split("-");
        let p=jornadas[j][i];

        if(r.gl>r.gv){
            if(puntos[p[0]]!==undefined) puntos[p[0]]+=3;
        }else if(r.gv>r.gl){
            if(puntos[p[1]]!==undefined) puntos[p[1]]+=3;
        }else{
            if(puntos[p[0]]!==undefined) puntos[p[0]]+=1;
            if(puntos[p[1]]!==undefined) puntos[p[1]]+=1;
        }
    });

    let tabla=Object.entries(puntos)
        .map(([e,p])=>({e,p}))
        .sort((a,b)=>b.p-a.p);

    let html="";

    tabla.forEach((t,i)=>{
        html+=`
        <div class="fila ${i>=7?'descenso':''}">
            <span>${i+11}. ${escudo(t.e)} ${t.e}</span>
            <span>${t.p}</span>
        </div>`;
    });

    document.getElementById("tabla").innerHTML=html;
}

renderNav();
renderPartidos();
calcular();

</script>

</body>
</html>
